name: Build Fabric Mod

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '8.8'

    - name: Build Mod
      run: |
        if [ -d "bhop-mod" ]; then
          cd bhop-mod
        fi
        gradle build

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: bhop-mod-jar
        path: "**/build/libs/*.jar"
